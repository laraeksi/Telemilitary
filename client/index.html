<!doctype html>
<!-- HTML entry point that mounts the React app. -->
<!-- The root div is where React renders. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Use a small Vite icon in dev -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- App title shown in browser tab -->
    <title>memory-game-frontend</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Vite injects the app bundle here -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
